<!DOCTYPE html>
<html>
<head>
    <title>Layout Without CSS</title>
</head>
<body>

<table border="0" width="100%" height="100%" cellspacing="10" cellpadding="20">

    <!-- Header -->
    <tr>
        <td colspan="3" align="center" bgcolor="#cfcfcf">Header</td>
    </tr>

    <!-- Navigation -->
    <tr>
        <td colspan="3" align="center" bgcolor="#d9d9d9">Navigation Menu</td>
    </tr>

    <!-- Main Content Row -->
    <tr height="400">
        <td width="20%" align="center" bgcolor="#e0e0e0">Content</td>
        <td width="60%" align="center" bgcolor="#ebebeb">Main Content</td>
        <td width="20%" align="center" bgcolor="#e0e0e0">Content</td>
    </tr>

    <!-- Footer -->
    <tr>
        <td colspan="3" align="center" bgcolor="#cfcfcf">Footer</td>
    </tr>

</table>

</body>
</html>
